# deploy.yml — Job Application Tracker CI/CD
#
# Trigger: push to main branch
#
# Pipeline per service:
#   1. Build JAR (Maven, cached)
#   2. Build Docker image (multi-stage)
#   3. Push to AWS ECR (tagged with commit SHA + latest)
#   4. Force-new-deployment on ECS service
#
# Required GitHub repository secrets:
#   AWS_ACCOUNT_ID          — your 12-digit AWS account ID
#   AWS_REGION              — e.g. us-east-1
#   AWS_ACCESS_KEY_ID       — IAM user with ECR push + ECS deploy permissions
#   AWS_SECRET_ACCESS_KEY   — IAM user secret
#   ECS_CLUSTER_NAME        — e.g. jat-staging-cluster
#
# Environment variables (set in this file, no secret required):
#   JAVA_VERSION, MAVEN_OPTS

name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: "17"
  MAVEN_OPTS: "-Xmx1024m"

# Required GitHub Secrets (in addition to the ones below per-job):
#   FRONTEND_S3_BUCKET          — e.g. jat-staging-frontend
#   CLOUDFRONT_DISTRIBUTION_ID  — from `terraform output cloudfront_distribution_id`

jobs:
  # ---------------------------------------------------------------------------
  # auth-service
  # ---------------------------------------------------------------------------
  deploy-auth:
    name: auth-service
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        working-directory: services/auth-service
        run: mvn package -DskipTests -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/jat-staging-auth:${IMAGE_TAG}"
          docker build \
            --cache-from "${ECR_REGISTRY}/jat-staging-auth:latest" \
            -t "${IMAGE_URI}" \
            -t "${ECR_REGISTRY}/jat-staging-auth:latest" \
            services/auth-service
          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/jat-staging-auth:latest"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
            --service jat-staging-auth \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
            --services jat-staging-auth \
            --region ${{ secrets.AWS_REGION }}

  # ---------------------------------------------------------------------------
  # application-service
  # ---------------------------------------------------------------------------
  deploy-application:
    name: application-service
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        working-directory: services/application-service
        run: mvn package -DskipTests -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/jat-staging-application:${IMAGE_TAG}"
          docker build \
            --cache-from "${ECR_REGISTRY}/jat-staging-application:latest" \
            -t "${IMAGE_URI}" \
            -t "${ECR_REGISTRY}/jat-staging-application:latest" \
            services/application-service
          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/jat-staging-application:latest"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
            --service jat-staging-application \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
            --services jat-staging-application \
            --region ${{ secrets.AWS_REGION }}

  # ---------------------------------------------------------------------------
  # notification-service
  # ---------------------------------------------------------------------------
  deploy-notification:
    name: notification-service
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        working-directory: services/notification-service
        run: mvn package -DskipTests -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/jat-staging-notification:${IMAGE_TAG}"
          docker build \
            --cache-from "${ECR_REGISTRY}/jat-staging-notification:latest" \
            -t "${IMAGE_URI}" \
            -t "${ECR_REGISTRY}/jat-staging-notification:latest" \
            services/notification-service
          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/jat-staging-notification:latest"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
            --service jat-staging-notification \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
            --services jat-staging-notification \
            --region ${{ secrets.AWS_REGION }}

  # ---------------------------------------------------------------------------
  # gateway-service — deployed last; depends on all downstream services being up
  # ---------------------------------------------------------------------------
  deploy-gateway:
    name: gateway-service
    runs-on: ubuntu-latest
    needs: [deploy-auth, deploy-application, deploy-notification]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        working-directory: services/gateway-service
        run: mvn package -DskipTests -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/jat-staging-gateway:${IMAGE_TAG}"
          docker build \
            --cache-from "${ECR_REGISTRY}/jat-staging-gateway:latest" \
            -t "${IMAGE_URI}" \
            -t "${ECR_REGISTRY}/jat-staging-gateway:latest" \
            services/gateway-service
          docker push "${IMAGE_URI}"
          docker push "${ECR_REGISTRY}/jat-staging-gateway:latest"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
            --service jat-staging-gateway \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
            --services jat-staging-gateway \
            --region ${{ secrets.AWS_REGION }}

  # ---------------------------------------------------------------------------
  # frontend — build React/Vite app, sync to S3, invalidate CloudFront
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ""
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync dist/ to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.FRONTEND_S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ secrets.FRONTEND_S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
